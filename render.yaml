services:
  - type: web
    name: urbanmor-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -e .
    startCommand: bash scripts/render_start.sh
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: SQL_ECHO
        value: "false"
      - key: DB_POOL_SIZE
        value: "10"
      - key: DB_MAX_OVERFLOW
        value: "20"
      - key: CORS_ALLOW_ORIGINS
        value: https://www.inkletlab.com,https://inkletlab.com
      - key: DATABASE_URL
        fromDatabase:
          name: urbanmor-db
          property: connectionString

databases:
  - name: urbanmor-db
    plan: basic-256mb
