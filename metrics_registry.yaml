schema_version: 1
artifact: metrics_registry
metrics:
  - metric_id: 'road.intersection_density'
    label: 'Intersection Density'
    category: 'road_network'
    display_default: true
    unit: 'intersections_per_sq_km'
    formula_summary: 'Intersections inside geometry divided by geometry area in square kilometers.'
    source_layers:
      - 'roads'
    feasibility: 'High'
    release_target: 'final'
    status: 'planned'
    null_rule: 'null_if_geometry_invalid_or_required_layers_missing'
    interpretation_direction: 'context_dependent'
    frontend_group: 'Road & Transit Network'
    validation_rule: 'value_non_negative'
  - metric_id: 'road.cnr'
    label: 'Connected Node Ratio (CNR)'
